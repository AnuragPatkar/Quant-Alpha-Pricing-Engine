name: Quant Alpha CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # FIX 1: Install project in editable mode so it's visible globally
          pip install -e . 

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy quant_alpha --ignore-missing-imports

      - name: Unit tests + coverage
        run: pytest -q --cov=quant_alpha --cov-report=term-missing --cov-fail-under=70

      - name: Profile smoke
        # FIX 2: Set PYTHONPATH to current directory just in case
        env:
          PYTHONPATH: .
        run: python scripts/profile_engine.py

      - name: Risk report smoke
        env:
          PYTHONPATH: .
        run: python scripts/risk_report.py